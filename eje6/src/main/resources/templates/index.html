<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>MeteoApp - Inicio</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
            padding-top: 50px;
        }
        .box {
            background: white;
            border: 1px solid #ccc;
            display: inline-block;
            padding: 30px;
            border-radius: 8px;
        }
        .btn {
            display: inline-block;
            background-color: #007bff;
            color: white;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 15px;
        }
        .btn:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>🌦️ MeteoApp</h1>
    <p>Sistema de predicción meteorológica</p>
    <hr>
    <a th:href="@{/prediccion}" class="btn">
        Ver predicción de la semana
    </a>
</div>

</body>
</html>
