<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Predicción Meteorológica</title>
    <style>
        table { border-collapse: collapse; width: 100%; text-align: center; font-family: sans-serif; }
        th, td { border: 1px solid #ddd; padding: 10px; }
        .verde { color: green; font-weight: bold; }
        .naranja { color: orange; font-weight: bold; }
        .rojo { color: red; font-weight: bold; }
    </style>
</head>
<body>
<h1>Predicción Meteorológica AEMET</h1>
<table>
    <tr>
        <th th:each="p : ${semana}" th:text="${#temporals.format(p.fecha, 'dd/MM')}"></th>
    </tr>
    <tr>
        <td th:each="p : ${semana}">
            <img th:src="${p.urlImagen}" width="50"><br>
            <span th:text="${p.probPrecipitacion} + '%'"></span>
        </td>
    </tr>
    <tr>
        <td th:each="p : ${semana}">
            <span style="color: blue" th:text="${p.tempMin} + '°'"></span> /
            <span style="color: red" th:text="${p.tempMax} + '°'"></span>
        </td>
    </tr>
    <tr>
        <td th:each="p : ${semana}">
            UV: <span th:text="${p.nivelUV}"
                      th:class="${p.nivelUV <= 1} ? 'verde' : (${p.nivelUV <= 3} ? 'naranja' : 'rojo')">
                </span>
        </td>
    </tr>
</table>
<p><a th:href="@{/}">Volver al inicio</a></p>
</body>
</html>
