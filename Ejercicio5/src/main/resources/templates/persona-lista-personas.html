<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Listado de Personas</title>
    <style>
        table { width: 80%; border-collapse: collapse; margin: 20px 0; }
        th, td { border: 1px solid #999; padding: 10px; text-align: left; }
        th { background-color: #f2f2f2; }
    </style>
</head>
<body>
<h1>Listado de 10 personas</h1>
<table>
    <thead>
    <tr>
        <th>Nombre Completo</th>
        <th>DNI</th>
        <th>Fecha Nacimiento</th>
        <th>Edad</th>
    </tr>
    </thead>
    <tbody>
    <tr th:each="p : ${personas}">
        <td th:text="${p.nombre} + ' ' + ${p.apellidos}">Nombre Apellido</td>
        <td th:text="${p.dni}">12345678X</td>
        <td th:text="${p.fechaNacimiento}">2000-01-01</td>
        <td th:text="${p.getEdad()}">0</td>
    </tr>
    </tbody>
</table>
<p><a th:href="@{/}">Volver al inicio</a></p>
</body>
</html>
